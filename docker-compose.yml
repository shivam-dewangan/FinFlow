version: '3.8'

services:
  mongodb:
    image: mongo:7
    container_name: mern_db
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: secret123
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  server:
    build: ./server
    container_name: mern_server
    restart: unless-stopped
    ports:
      - "5001:5001"
    environment:
      NODE_ENV: production
      MONGO_URI: mongodb://admin:secret123@mongodb:27017/mern_db?authSource=admin
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - mern_network

  client:
    build: ./client
    container_name: mern_client
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - server
    networks:
      - mern_network

volumes:
  mongo_data:

networks:
  mern_network:
    driver: bridge
